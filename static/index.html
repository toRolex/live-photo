<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Photo Maker</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
  background: #fafafa;
  color: #1d1d1f;
  max-width: 640px;
  margin: 0 auto;
  padding: 40px 20px;
}

h1 { font-size: 28px; font-weight: 600; text-align: center; margin-bottom: 8px; }
.subtitle { text-align: center; color: #86868b; font-size: 14px; margin-bottom: 24px; }

/* ── Mode toggle ── */
.mode-toggle {
  display: flex; justify-content: center; gap: 8px; margin-bottom: 24px;
}
.mode-btn {
  padding: 6px 16px; border: 1px solid #d2d2d7; border-radius: 20px;
  background: #fff; font-size: 13px; cursor: pointer; color: #86868b; transition: all 0.2s;
}
.mode-btn.active { background: #1d1d1f; color: #fff; border-color: #1d1d1f; }

/* ── A区: AI 生图 ── */
.ai-section {
  background: #fff; border-radius: 12px; padding: 16px; margin-bottom: 16px;
}
.input-area { display: flex; gap: 8px; }
textarea {
  flex: 1; padding: 12px 16px; border: 1px solid #d2d2d7; border-radius: 10px;
  font-size: 15px; resize: none; height: 48px; font-family: inherit;
  outline: none; transition: border-color 0.2s;
}
textarea:focus { border-color: #1d1d1f; }
.btn-primary {
  padding: 0 20px; background: #1d1d1f; color: #fff; border: none;
  border-radius: 10px; font-size: 15px; font-weight: 500; cursor: pointer;
  white-space: nowrap; transition: opacity 0.2s;
}
.btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }

/* ── Divider ── */
.divider {
  display: flex; align-items: center; gap: 12px; margin-bottom: 16px; color: #86868b; font-size: 13px;
}
.divider::before, .divider::after {
  content: ''; flex: 1; height: 1px; background: #d2d2d7;
}

/* ── B区: 上传 ── */
.upload-section {
  border: 2px dashed #d2d2d7; border-radius: 12px; padding: 28px 20px;
  text-align: center; cursor: pointer; transition: all 0.2s; margin-bottom: 16px;
  background: #fff;
}
.upload-section:hover { border-color: #86868b; }
.upload-section.drag-over { border-color: #1d1d1f; }
.upload-section.has-file { border: 2px solid #34c759; background: #f0fff4; }
.upload-section .icon { font-size: 32px; margin-bottom: 8px; }
.upload-section .hint { font-size: 13px; color: #86868b; }
.upload-section .filename { font-size: 14px; color: #1d1d1f; margin-top: 8px; font-weight: 500; }
.upload-section input[type=file] { display: none; }

/* ── C区: 预览卡片 ── */
.preview-card {
  background: #fff; border-radius: 12px; padding: 16px; margin-bottom: 16px; display: none;
}
.preview-card.visible { display: block; }
.preview-card img {
  width: 100%; border-radius: 8px; margin-bottom: 12px; display: block;
}
.preview-actions { display: flex; gap: 8px; }
.btn-secondary {
  flex: 1; padding: 10px 0; background: #f5f5f7; color: #1d1d1f; border: 1px solid #d2d2d7;
  border-radius: 10px; font-size: 14px; font-weight: 500; cursor: pointer; text-align: center;
  transition: all 0.2s;
}
.btn-secondary:hover { background: #e8e8ed; }

/* ── C区: Video settings ── */
.video-settings { margin-top: 12px; padding-top: 12px; border-top: 1px solid #f5f5f7; }
.video-settings summary {
  font-size: 13px; color: #86868b; cursor: pointer; user-select: none;
}
.video-settings summary:hover { color: #1d1d1f; }
.video-settings-body { margin-top: 12px; }
.video-settings-body label {
  display: block; font-size: 13px; color: #1d1d1f; margin-bottom: 4px; font-weight: 500;
}
.video-settings-body textarea,
.video-settings-body input[type=number],
.video-settings-body select {
  width: 100%; padding: 8px 12px; border: 1px solid #d2d2d7; border-radius: 8px;
  font-size: 13px; font-family: inherit; outline: none; margin-bottom: 10px;
  transition: border-color 0.2s;
}
.video-settings-body textarea:focus,
.video-settings-body input:focus,
.video-settings-body select:focus { border-color: #1d1d1f; }
.video-settings-body textarea { resize: vertical; min-height: 60px; }
.video-settings-body .row { display: flex; gap: 10px; }
.video-settings-body .row > div { flex: 1; }
.video-settings-body .hint-text { font-size: 11px; color: #86868b; margin-top: -6px; margin-bottom: 10px; }

.btn-continue {
  width: 100%; padding: 10px 0; background: #1d1d1f; color: #fff; border: none;
  border-radius: 10px; font-size: 14px; font-weight: 500; cursor: pointer; margin-top: 4px;
  transition: opacity 0.2s;
}
.btn-continue:hover { opacity: 0.9; }
.btn-continue:disabled { opacity: 0.4; cursor: not-allowed; }

/* ── Last frame upload ── */
.last-frame-zone {
  border: 1px dashed #d2d2d7; border-radius: 8px; padding: 10px; text-align: center;
  cursor: pointer; font-size: 12px; color: #86868b; margin-bottom: 10px; transition: border-color 0.2s;
}
.last-frame-zone:hover { border-color: #1d1d1f; }
.last-frame-zone input[type=file] { display: none; }

/* ── D区: 进度面板 ── */
.progress-panel {
  background: #fff; border-radius: 12px; padding: 20px; margin-bottom: 16px;
}
.progress-panel.hidden { display: none; }

/* 请求信息 */
.request-info {
  background: #f5f5f7; border-radius: 8px; padding: 10px 14px; margin-bottom: 16px;
  font-size: 13px; color: #86868b; word-break: break-all;
}
.request-info .info-label { font-weight: 500; color: #1d1d1f; }
.request-info .info-row { margin-bottom: 4px; }
.request-info .info-row:last-child { margin-bottom: 0; }

/* 步骤指示器 */
.step-indicator { display: flex; align-items: center; justify-content: center; margin-bottom: 14px; }
.step-dot {
  width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center;
  justify-content: center; font-size: 12px; font-weight: 600; background: #f5f5f7;
  color: #86868b; border: 2px solid #e5e5ea; transition: all 0.3s;
}
.step-dot.active { background: #1d1d1f; color: #fff; border-color: #1d1d1f; }
.step-dot.done { background: #34c759; color: #fff; border-color: #34c759; }
.step-dot.error { background: #ff3b30; color: #fff; border-color: #ff3b30; }
.step-line { flex: 1; height: 2px; background: #e5e5ea; margin: 0 6px; max-width: 60px; transition: background 0.3s; }
.step-line.done { background: #34c759; }

/* 步骤标签 */
.step-labels {
  display: flex; justify-content: space-between; margin-bottom: 16px; padding: 0 4px;
}
.step-label {
  font-size: 11px; color: #aeaeb2; text-align: center; flex: 1; transition: color 0.3s;
}
.step-label.active { color: #1d1d1f; font-weight: 500; }
.step-label.done { color: #34c759; }

/* 进度条 */
.progress-bar-wrap {
  height: 4px; background: #f5f5f7; border-radius: 2px; margin-bottom: 12px; overflow: hidden;
}
.progress-fill-animated {
  height: 100%; background: #1d1d1f; border-radius: 2px;
  transition: width 0.4s ease; width: 0;
}
.progress-bar-wrap.indeterminate .progress-fill-animated {
  width: 30%; animation: progressIndeterminate 1.5s ease-in-out infinite;
}
@keyframes progressIndeterminate {
  0% { transform: translateX(-100%); }
  100% { transform: translateX(400%); }
}

/* 当前状态行 */
.current-status {
  display: flex; align-items: center; gap: 8px; margin-bottom: 12px; font-size: 13px;
}
.spinner {
  width: 14px; height: 14px; border: 2px solid #e5e5ea; border-top-color: #1d1d1f;
  border-radius: 50%; animation: spin 0.8s linear infinite; flex-shrink: 0;
}
@keyframes spin { to { transform: rotate(360deg); } }
.elapsed-badge {
  margin-left: auto; font-size: 11px; color: #86868b; background: #f5f5f7;
  padding: 2px 8px; border-radius: 10px; flex-shrink: 0;
}

/* 事件日志 */
.event-log {
  list-style: none; max-height: 180px; overflow-y: auto; font-size: 12px;
}
.event-log li {
  padding: 4px 0; color: #86868b; border-bottom: 1px solid #f5f5f7;
  display: flex; align-items: center; gap: 6px;
}
.event-log li:last-child { border-bottom: none; }
.event-log .evt-time { color: #aeaeb2; flex-shrink: 0; font-variant-numeric: tabular-nums; }
.event-log .evt-msg { flex: 1; }

/* 错误区域 */
.error-area {
  background: #fff; border-radius: 12px; padding: 14px 16px; margin-bottom: 16px;
  border-left: 4px solid #ff3b30; display: none; font-size: 14px; color: #1d1d1f;
}
.error-area.visible { display: block; }

/* 下载区域 */
.download-area {
  text-align: center; display: none; margin-bottom: 16px;
}
.download-area.visible { display: block; }
.download-area a {
  display: inline-block; padding: 12px 32px; background: #1d1d1f; color: #fff;
  border-radius: 10px; text-decoration: none; font-size: 15px; font-weight: 500;
  transition: opacity 0.2s;
}
.download-area a:hover { opacity: 0.9; }

[aria-live="polite"] { position: absolute; left: -9999px; width: 1px; height: 1px; overflow: hidden; }
</style>
</head>
<body>

<h1>Live Photo Maker</h1>
<p class="subtitle">输入文字描述或上传图片，一键生成 Live Photo</p>

<div class="mode-toggle">
  <button class="mode-btn" data-mode="cli" onclick="setMode('cli')">CLI 模式</button>
  <button class="mode-btn active" data-mode="api" onclick="setMode('api')">API 模式</button>
</div>

<!-- A区: AI 生图 -->
<div class="ai-section">
  <div class="input-area">
    <textarea id="prompt" placeholder="例如：一只戴墨镜的橘猫坐在沙滩上晒太阳" maxlength="500"></textarea>
    <button class="btn-primary" id="submit-btn" onclick="handleTextSubmit()">生成图片</button>
  </div>
</div>

<!-- 分隔线 -->
<div class="divider">或</div>

<!-- B区: 上传 -->
<div class="upload-section" id="upload-zone" onclick="document.getElementById('file-input').click()">
  <div class="icon">&#x1F4C1;</div>
  <div class="hint">点击或拖拽图片到这里（支持 JPG/PNG/HEIC，最大 20MB）</div>
  <div class="filename" id="upload-filename"></div>
  <input type="file" id="file-input" accept="image/*" onchange="handleFileSelect(event)">
</div>

<!-- C区: 预览 + 视频设置 -->
<div class="preview-card" id="preview-card">
  <img id="preview-img" src="" alt="预览图片">
  <div class="preview-actions">
    <button class="btn-secondary" onclick="saveImage()">保存图片</button>
  </div>

  <details class="video-settings" id="video-settings">
    <summary>视频参数设置</summary>
    <div class="video-settings-body">
      <label for="video-prompt">视频提示词</label>
      <textarea id="video-prompt" maxlength="800" placeholder="描述视频中的动态效果"></textarea>
      <p class="hint-text">建议400字以内</p>

      <div class="row">
        <div>
          <label for="video-frames">时长</label>
          <select id="video-frames">
            <option value="121">5 秒</option>
            <option value="241">10 秒</option>
          </select>
        </div>
        <div>
          <label for="video-seed">随机种子</label>
          <input type="number" id="video-seed" value="-1" min="-1" max="999999">
          <p class="hint-text">-1=随机，相同种子+相同参数=相同视频</p>
        </div>
      </div>

      <label>尾帧图片（可选）</label>
      <div class="last-frame-zone" onclick="document.getElementById('last-frame-input').click()">
        <div id="last-frame-label">点击上传尾帧图片（PNG/JPG）</div>
        <input type="file" id="last-frame-input" accept="image/png,image/jpeg" onchange="handleLastFrameSelect(event)">
      </div>

      <button class="btn-continue" id="continue-btn" onclick="continueToVideo()">继续生成 Live Photo</button>
    </div>
  </details>
</div>

<!-- D区: 进度面板 -->
<div class="progress-panel hidden" id="progress-panel" aria-live="polite">
  <div class="request-info" id="request-info"></div>

  <div class="step-indicator">
    <div class="step-dot step-dot-1" id="step-dot-1">1</div>
    <div class="step-line step-line-1" id="step-line-1"></div>
    <div class="step-dot step-dot-2" id="step-dot-2">2</div>
    <div class="step-line step-line-2" id="step-line-2"></div>
    <div class="step-dot step-dot-3" id="step-dot-3">3</div>
  </div>
  <div class="step-labels">
    <span class="step-label" id="step-label-1">获取图片</span>
    <span class="step-label" id="step-label-2">生成视频</span>
    <span class="step-label" id="step-label-3">打包</span>
  </div>

  <div class="progress-bar-wrap" id="progress-bar-wrap">
    <div class="progress-fill-animated" id="progress-fill"></div>
  </div>

  <div class="current-status">
    <span class="spinner" id="status-spinner"></span>
    <span id="status-text">准备中…</span>
    <span class="elapsed-badge" id="elapsed-badge"></span>
  </div>

  <ul class="event-log" id="event-log"></ul>
</div>

<!-- 错误区 -->
<div class="error-area" id="error-area"></div>

<!-- 下载区 -->
<div class="download-area" id="download-area">
  <a id="download-link" href="#">下载 Live Photo</a>
</div>

<script>
const POLL_INTERVAL = 3000;
const MAX_FILE_SIZE = 20 * 1024 * 1024;
const IMAGE_KEY = 'lpm_image_task';
const VIDEO_KEY = 'lpm_video_task';

let pollTimer = null;
let currentMode = 'api';
let currentImageTaskId = null;
let lastFrameB64 = null;
let activeTaskId = null;
let activeSourceLabel = '';

function $(id) { return document.getElementById(id); }

// ── Mode ──

function setMode(mode) {
  currentMode = mode;
  document.querySelectorAll('.mode-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.mode === mode);
  });
}

// ── File select / upload ──

function handleFileSelect(event) {
  const file = event.target.files[0];
  if (!file) return;
  if (file.size > MAX_FILE_SIZE) { alert('图片不能超过 ' + (MAX_FILE_SIZE / 1024 / 1024) + 'MB'); return; }

  const reader = new FileReader();
  reader.onload = () => {
    const base64 = reader.result.split(',')[1];
    $('upload-filename').textContent = file.name;
    $('upload-zone').classList.add('has-file');
    uploadImageToServer(file.name, base64);
  };
  reader.readAsDataURL(file);
}

async function uploadImageToServer(filename, base64) {
  try {
    const byteChars = atob(base64);
    const byteArr = new Uint8Array(byteChars.length);
    for (let i = 0; i < byteChars.length; i++) { byteArr[i] = byteChars.charCodeAt(i); }
    const blob = new Blob([byteArr], { type: 'image/png' });

    const formData = new FormData();
    formData.append('file', blob, filename);

    const resp = await fetch('/api/upload-image', { method: 'POST', body: formData });
    if (!resp.ok) {
      const err = await resp.json().catch(() => ({}));
      showError(err.detail || '上传失败');
      return;
    }
    const data = await resp.json();

    // Upload mode: IMAGE_READY, show preview immediately
    currentImageTaskId = data.task_id;
    localStorage.setItem(IMAGE_KEY, data.task_id);
    activeSourceLabel = 'upload:' + filename;

    showImagePreview(data.task_id, base64, '');
  } catch (e) {
    showError('网络错误，请重试');
  }
}

// ── Text → Image (AI) ──

async function handleTextSubmit() {
  const prompt = $('prompt').value.trim();
  if (!prompt) return alert('请输入描述');
  if (prompt.length > 500) return alert('超过 500 字符限制');

  const btn = $('submit-btn');
  btn.disabled = true;

  try {
    const resp = await fetch('/api/generate-image', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt }),
    });
    if (!resp.ok) {
      const err = await resp.json();
      showError(err.detail || '请求失败');
      btn.disabled = false;
      return;
    }
    const data = await resp.json();
    currentImageTaskId = data.task_id;
    activeSourceLabel = 'ai:' + prompt.substring(0, 40);
    localStorage.setItem(IMAGE_KEY, data.task_id);
    startImagePolling(data.task_id);
  } catch (e) {
    showError('网络错误，请重试');
    btn.disabled = false;
  }
}

function startImagePolling(taskId) {
  clearPollTimer();
  showProgressPanel(taskId, 'ai');
  resetSteps();
  setStep(1, 'active');
  $('status-text').textContent = '正在生成图片…';
  hideError();

  pollTimer = setInterval(async () => {
    try {
      const resp = await fetch('/api/status/' + taskId);
      if (!resp.ok) { clearPollTimer(); return; }
      const data = await resp.json();
      updateProgressFromData(data);

      if (data.status === 'image_ready') {
        clearPollTimer();
        showImagePreview(taskId, data.image_base64, data.video_prompt);
        $('submit-btn').disabled = false;
      } else if (data.status === 'failed') {
        clearPollTimer();
        showError(data.error || '生成失败，请重试');
        localStorage.removeItem(IMAGE_KEY);
        $('submit-btn').disabled = false;
      }
    } catch (e) { /* continue polling */ }
  }, POLL_INTERVAL);
}

// ── Image preview ──

function showImagePreview(taskId, imageBase64, videoPrompt) {
  currentImageTaskId = taskId;
  if (imageBase64) {
    $('preview-img').src = 'data:image/png;base64,' + imageBase64;
  }
  $('preview-card').classList.add('visible');
  $('video-settings').open = false;
  $('video-prompt').value = videoPrompt || '';
  $('continue-btn').disabled = false;
}

function saveImage() {
  const link = document.createElement('a');
  link.download = 'livephoto_' + Date.now() + '.png';
  link.href = $('preview-img').src;
  link.click();
}

// ── Last frame ──

function handleLastFrameSelect(event) {
  const file = event.target.files[0];
  if (!file) return;
  if (file.size > 4.7 * 1024 * 1024) { alert('尾帧图片不能超过 4.7MB'); return; }
  const reader = new FileReader();
  reader.onload = () => {
    lastFrameB64 = reader.result.split(',')[1];
    $('last-frame-label').textContent = '已选择: ' + file.name;
  };
  reader.readAsDataURL(file);
}

// ── Video generation ──

function collectVideoSettings() {
  return {
    video_prompt: $('video-prompt').value,
    video_seed: parseInt($('video-seed').value, 10) || -1,
    video_frames: parseInt($('video-frames').value, 10) || 121,
    last_frame_base64: lastFrameB64,
  };
}

async function continueToVideo() {
  if (!currentImageTaskId) return;
  $('continue-btn').disabled = true;
  hideError();

  const settings = collectVideoSettings();
  activeTaskId = currentImageTaskId;

  try {
    const resp = await fetch('/api/generate-video', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        task_id: currentImageTaskId,
        mode: currentMode,
        ...settings,
      }),
    });
    if (!resp.ok) {
      const err = await resp.json();
      showError(err.detail || '请求失败');
      $('continue-btn').disabled = false;
      return;
    }
    const data = await resp.json();
    if (data.task_id) {
      localStorage.setItem(VIDEO_KEY, data.task_id);
      activeTaskId = data.task_id;
      startVideoPolling(data.task_id, () => {
        $('preview-card').classList.remove('visible');
      });
    }
  } catch (e) {
    showError('网络错误，请重试');
    $('continue-btn').disabled = false;
  }
}

function startVideoPolling(taskId, onDone) {
  clearPollTimer();
  showProgressPanel(taskId, 'video');
  resetSteps();
  setStep(1, 'done');
  setStep(2, 'active');
  $('status-text').textContent = '正在生成视频…';
  $('download-area').classList.remove('visible');
  hideError();

  pollTimer = setInterval(async () => {
    try {
      const resp = await fetch('/api/status/' + taskId);
      if (!resp.ok) { clearPollTimer(); return; }
      const data = await resp.json();
      updateProgressFromData(data);

      if (data.status === 'done') {
        clearPollTimer();
        $('download-area').classList.add('visible');
        $('download-link').href = data.download_url || ('/api/download/' + taskId);
        localStorage.removeItem(VIDEO_KEY);
        localStorage.removeItem(IMAGE_KEY);
        onDone();
      } else if (data.status === 'failed') {
        clearPollTimer();
        showError(data.error || '生成失败，请重试');
        $('continue-btn').disabled = false;
        localStorage.removeItem(VIDEO_KEY);
        onDone();
      }
    } catch (e) { /* continue polling */ }
  }, POLL_INTERVAL);
}

// ── Progress panel ──

function showProgressPanel(taskId, mode) {
  activeTaskId = taskId;
  $('progress-panel').classList.remove('hidden');

  let infoHtml = '';
  if (activeSourceLabel && activeSourceLabel.startsWith('ai:')) {
    infoHtml = '<strong>来源：</strong>AI 生成<br><strong>描述：</strong>' + escHtml(activeSourceLabel.substring(3));
  } else if (activeSourceLabel && activeSourceLabel.startsWith('upload:')) {
    infoHtml = '<strong>来源：</strong>上传图片<br><strong>文件：</strong>' + escHtml(activeSourceLabel.substring(7));
  } else {
    infoHtml = '<strong>来源：</strong>' + escHtml(mode || activeSourceLabel || '-');
  }
  infoHtml += '<br><strong>模式：</strong>' + (currentMode === 'cli' ? 'CLI' : 'API');

  $('request-info').innerHTML = infoHtml;
}

function hideProgressPanel() {
  $('progress-panel').classList.add('hidden');
  activeTaskId = null;
}

function resetSteps() {
  elapsedStart = null;
  [1, 2, 3].forEach(n => {
    const dot = $('step-dot-' + n);
    const line = n < 3 ? $('step-line-' + n) : null;
    const label = $('step-label-' + n);
    dot.className = 'step-dot step-dot-' + n;
    dot.textContent = n;
    if (line) line.className = 'step-line step-line-' + n;
    if (label) label.className = 'step-label';
  });
  $('progress-fill').style.width = '0%';
  $('progress-bar-wrap').classList.remove('indeterminate');
  $('status-spinner').style.display = '';
  $('elapsed-badge').textContent = '';
  $('event-log').innerHTML = '';
}

function setStep(n, state) {
  const dot = $('step-dot-' + n);
  dot.className = 'step-dot step-dot-' + n + ' ' + state;
  if (state === 'done') {
    dot.textContent = '✓';
  } else if (state === 'error') {
    dot.textContent = '!';
  } else {
    dot.textContent = n;
  }
  if (n > 1) {
    const line = $('step-line-' + (n - 1));
    line.className = 'step-line step-line-' + (n - 1) + (state === 'done' ? ' done' : '');
  }
  // 步骤标签
  const label = $('step-label-' + n);
  if (label) {
    label.className = 'step-label' + (state === 'active' ? ' active' : '') + (state === 'done' ? ' done' : '');
  }
}

let elapsedStart = null;

function updateProgressFromData(data) {
  const status = data.status || '';

  // Track elapsed — prefer backend value when available
  if (data.elapsed_seconds > 0) {
    $('elapsed-badge').textContent = formatElapsed(Math.floor(data.elapsed_seconds));
  } else if (!elapsedStart) {
    elapsedStart = Date.now();
    $('elapsed-badge').textContent = '0s';
  } else {
    const sec = Math.floor((Date.now() - elapsedStart) / 1000);
    $('elapsed-badge').textContent = formatElapsed(sec);
  }

  // Progress bar
  let pct = 0;
  if (status === 'generating_image') {
    pct = 30;
    setStep(1, 'active');
    $('status-text').textContent = data.progress_message || '生成图片中…';
    $('progress-bar-wrap').classList.add('indeterminate');
  } else if (status === 'image_ready') {
    pct = 100;
    setStep(1, 'done');
    $('status-text').textContent = '图片生成完成';
    $('progress-bar-wrap').classList.remove('indeterminate');
  } else if (status === 'generating_video') {
    pct = 40;
    setStep(2, 'active');
    $('status-text').textContent = data.progress_message || '生成视频中…';
    $('progress-bar-wrap').classList.add('indeterminate');
  } else if (status === 'packaging') {
    pct = 80;
    setStep(2, 'done');
    setStep(3, 'active');
    $('status-text').textContent = data.progress_message || '封装 Live Photo…';
    $('progress-bar-wrap').classList.remove('indeterminate');
  } else if (status === 'done') {
    pct = 100;
    setStep(2, 'done');
    setStep(3, 'done');
    $('status-text').textContent = '生成完成!';
    $('status-spinner').style.display = 'none';
    $('progress-bar-wrap').classList.remove('indeterminate');
  } else if (status === 'failed') {
    setStep(1, 'error');
    setStep(2, 'error');
    setStep(3, 'error');
    $('status-text').textContent = data.error || '任务失败';
    $('status-spinner').style.display = 'none';
    $('progress-bar-wrap').classList.remove('indeterminate');
  }

  if (!status || status === 'queued') {
    pct = 5;
    $('progress-bar-wrap').classList.add('indeterminate');
    $('status-text').textContent = data.progress_message || '排队中…';
  }

  $('progress-fill').style.width = pct + '%';

  // Event log — use backend progress_timeline
  const timeline = data.progress_timeline || [];
  const log = $('event-log');
  const currentCount = log.querySelectorAll('li').length;
  for (let i = currentCount; i < timeline.length; i++) {
    const item = timeline[i];
    const li = document.createElement('li');
    const d = new Date(item.ts * 1000);
    const time = d.getHours().toString().padStart(2, '0') + ':' +
                 d.getMinutes().toString().padStart(2, '0') + ':' +
                 d.getSeconds().toString().padStart(2, '0');
    li.innerHTML = '<span class="evt-time">' + time + '</span><span class="evt-msg">' + escHtml(item.message) + '</span>';
    log.appendChild(li);
    log.scrollTop = log.scrollHeight;
  }
}

function appendEvent(msg) {
  if (!msg) return;
  const log = $('event-log');
  const now = new Date();
  const time = now.getHours().toString().padStart(2, '0') + ':' +
               now.getMinutes().toString().padStart(2, '0') + ':' +
               now.getSeconds().toString().padStart(2, '0');
  const li = document.createElement('li');
  li.innerHTML = '<span class="evt-time">' + time + '</span><span class="evt-msg">' + escHtml(msg) + '</span>';
  log.appendChild(li);
  log.scrollTop = log.scrollHeight;
}

// ── Error ──

function showError(msg) {
  $('error-area').textContent = msg;
  $('error-area').classList.add('visible');
}

function hideError() {
  $('error-area').classList.remove('visible');
  $('error-area').textContent = '';
}

// ── Utils ──

function clearPollTimer() {
  if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
}

function formatElapsed(s) {
  if (s < 60) return s + 's';
  const m = Math.floor(s / 60);
  const rs = s % 60;
  return m + 'm ' + rs + 's';
}

function escHtml(s) {
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

// ── Drag & drop ──

const uploadZoneEl = $('upload-zone');
uploadZoneEl.addEventListener('dragover', e => { e.preventDefault(); uploadZoneEl.classList.add('drag-over'); });
uploadZoneEl.addEventListener('dragleave', () => uploadZoneEl.classList.remove('drag-over'));
uploadZoneEl.addEventListener('drop', e => {
  e.preventDefault();
  uploadZoneEl.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (!file) return;
  if (file.size > MAX_FILE_SIZE) { alert('图片不能超过 ' + (MAX_FILE_SIZE / 1024 / 1024) + 'MB'); return; }
  const reader = new FileReader();
  reader.onload = () => {
    const base64 = reader.result.split(',')[1];
    $('upload-filename').textContent = file.name;
    $('upload-zone').classList.add('has-file');
    uploadImageToServer(file.name, base64);
  };
  reader.readAsDataURL(file);
});

// ── Session recovery ──

window.addEventListener('DOMContentLoaded', () => {
  const savedImage = localStorage.getItem(IMAGE_KEY);
  const savedVideo = localStorage.getItem(VIDEO_KEY);
  if (savedVideo) {
    activeTaskId = savedVideo;
    activeSourceLabel = 'session-recovery';
    startVideoPolling(savedVideo, () => {});
  } else if (savedImage) {
    currentImageTaskId = savedImage;
    activeSourceLabel = 'session-recovery';
    startImagePolling(savedImage);
  }
});
</script>
