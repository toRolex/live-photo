<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Photo Maker</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
  background: #fafafa;
  color: #1d1d1f;
  max-width: 640px;
  margin: 0 auto;
  padding: 40px 20px;
}
h1 { font-size: 28px; font-weight: 600; text-align: center; margin-bottom: 8px; }
.subtitle { text-align: center; color: #86868b; font-size: 14px; margin-bottom: 24px; }

/* ── Mode toggle ── */
.mode-toggle {
  display: flex; justify-content: center; gap: 8px; margin-bottom: 24px;
}
.mode-btn {
  padding: 6px 16px; border: 1px solid #d2d2d7; border-radius: 20px;
  background: #fff; font-size: 13px; cursor: pointer; color: #86868b; transition: all 0.2s;
}
.mode-btn.active { background: #1d1d1f; color: #fff; border-color: #1d1d1f; }

/* ── Tab switcher ── */
.tab-bar { display: flex; gap: 0; margin-bottom: 20px; border-bottom: 1px solid #e5e5ea; }
.tab {
  flex: 1; text-align: center; padding: 12px 0; font-size: 14px; color: #86868b;
  cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.2s;
}
.tab.active { color: #1d1d1f; border-bottom-color: #1d1d1f; font-weight: 500; }
.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* ── Input area ── */
.input-area { display: flex; gap: 8px; margin-bottom: 16px; }
textarea {
  flex: 1; padding: 12px 16px; border: 1px solid #d2d2d7; border-radius: 10px;
  font-size: 15px; resize: none; height: 48px; font-family: inherit;
  outline: none; transition: border-color 0.2s;
}
textarea:focus { border-color: #1d1d1f; }
.btn-primary {
  padding: 0 20px; background: #1d1d1f; color: #fff; border: none;
  border-radius: 10px; font-size: 15px; font-weight: 500; cursor: pointer;
  white-space: nowrap; transition: opacity 0.2s;
}
.btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }

/* ── Upload zone ── */
.upload-zone {
  border: 2px dashed #d2d2d7; border-radius: 12px; padding: 32px 20px;
  text-align: center; cursor: pointer; transition: border-color 0.2s; margin-bottom: 16px;
}
.upload-zone:hover, .upload-zone.drag-over { border-color: #1d1d1f; }
.upload-zone .icon { font-size: 32px; margin-bottom: 8px; }
.upload-zone .hint { font-size: 13px; color: #86868b; }
.upload-zone input[type=file] { display: none; }
.upload-zone .filename { font-size: 14px; color: #1d1d1f; margin-top: 8px; }

/* ── Upload video settings ── */
.upload-video-settings {
  display: none;
  background: #fff;
  border-radius: 12px;
  padding: 16px;
  margin-bottom: 16px;
}
.upload-video-settings.visible { display: block; }

/* ── Image preview ── */
.preview-card {
  background: #fff; border-radius: 12px; padding: 16px; margin-bottom: 16px; display: none;
}
.preview-card.visible { display: block; }
.preview-card img {
  width: 100%; border-radius: 8px; margin-bottom: 12px; display: block;
}
.preview-actions { display: flex; gap: 8px; }
.btn-secondary {
  flex: 1; padding: 10px 0; background: #f5f5f7; color: #1d1d1f; border: 1px solid #d2d2d7;
  border-radius: 10px; font-size: 14px; font-weight: 500; cursor: pointer; text-align: center;
  transition: all 0.2s;
}
.btn-secondary:hover { background: #e8e8ed; }

/* ── Video settings panel ── */
.video-settings {
  margin-top: 12px;
  padding-top: 12px;
  border-top: 1px solid #f5f5f7;
}
.video-settings summary {
  font-size: 13px; color: #86868b; cursor: pointer; user-select: none;
}
.video-settings summary:hover { color: #1d1d1f; }
.video-settings-body { margin-top: 12px; }
.video-settings-body label {
  display: block; font-size: 13px; color: #1d1d1f; margin-bottom: 4px; font-weight: 500;
}
.video-settings-body textarea,
.video-settings-body input[type=number],
.video-settings-body select {
  width: 100%; padding: 8px 12px; border: 1px solid #d2d2d7; border-radius: 8px;
  font-size: 13px; font-family: inherit; outline: none; margin-bottom: 10px;
  transition: border-color 0.2s;
}
.video-settings-body textarea:focus,
.video-settings-body input:focus,
.video-settings-body select:focus { border-color: #1d1d1f; }
.video-settings-body textarea { resize: vertical; min-height: 60px; }
.video-settings-body .row { display: flex; gap: 10px; }
.video-settings-body .row > div { flex: 1; }
.video-settings-body .hint-text { font-size: 11px; color: #86868b; margin-top: -6px; margin-bottom: 10px; }
.btn-continue {
  width: 100%; padding: 10px 0; background: #1d1d1f; color: #fff; border: none;
  border-radius: 10px; font-size: 14px; font-weight: 500; cursor: pointer; margin-top: 4px;
}
.btn-continue:hover { opacity: 0.9; }

/* ── Preview progress (inside card) ── */
.preview-progress {
  display: none;
  margin-top: 12px;
  padding-top: 12px;
  border-top: 1px solid #f5f5f7;
}
.preview-progress-text {
  font-size: 13px; color: #86868b; text-align: center; margin-top: 8px;
}

/* ── Last frame upload ── */
.last-frame-zone {
  border: 1px dashed #d2d2d7; border-radius: 8px; padding: 10px; text-align: center;
  cursor: pointer; font-size: 12px; color: #86868b; margin-bottom: 10px;
}
.last-frame-zone:hover { border-color: #1d1d1f; }
.last-frame-zone input[type=file] { display: none; }

/* ── Status area ── */
#status-area {
  background: #fff; border-radius: 12px; padding: 20px;
  display: none; margin-bottom: 16px;
}
#status-area.visible { display: block; }
.progress-bar {
  height: 4px; background: #f5f5f7; border-radius: 2px; margin-bottom: 12px; overflow: hidden;
}
.progress-fill {
  height: 100%; background: #1d1d1f; border-radius: 2px;
  transition: width 0.3s; width: 0;
}
#status-text { font-size: 14px; color: #1d1d1f; }
#error-text { color: #ff3b30; font-size: 14px; margin-bottom: 12px; }

/* ── Download area ── */
#download-area { text-align: center; display: none; }
#download-area.visible { display: block; }
#download-area a {
  display: inline-block; padding: 12px 32px; background: #1d1d1f; color: #fff;
  border-radius: 10px; text-decoration: none; font-size: 15px; font-weight: 500;
}
[aria-live="polite"] { position: absolute; left: -9999px; width: 1px; height: 1px; overflow: hidden; }
</style>
</head>
<body>

<h1>Live Photo Maker</h1>
<p class="subtitle">输入文字描述或上传图片，一键生成 Live Photo</p>

<div class="mode-toggle">
  <button class="mode-btn" data-mode="cli" onclick="setMode('cli')">CLI 模式</button>
  <button class="mode-btn active" data-mode="api" onclick="setMode('api')">API 模式</button>
</div>

<div class="tab-bar">
  <div class="tab active" data-tab="text" onclick="switchTab('text')">文生图</div>
  <div class="tab" data-tab="upload" onclick="switchTab('upload')">上传图片</div>
</div>

<!-- Text-to-Image panel -->
<div class="tab-panel active" id="panel-text">
  <div class="input-area">
    <textarea id="prompt" placeholder="例如：一只戴墨镜的橘猫坐在沙滩上晒太阳" maxlength="500"></textarea>
    <button class="btn-primary" id="submit-btn" onclick="handleTextSubmit()">生成图片</button>
  </div>
</div>

<!-- Upload panel -->
<div class="tab-panel" id="panel-upload">
  <div class="upload-zone" id="upload-zone" onclick="document.getElementById('file-input').click()">
    <div class="icon">📁</div>
    <div class="hint">点击或拖拽图片到这里（支持 JPG/PNG/HEIC，最大 20MB）</div>
    <div class="filename" id="upload-filename"></div>
    <input type="file" id="file-input" accept="image/*" onchange="handleFileSelect(event)">
  </div>
  <button class="btn-primary" id="upload-btn" style="width:100%" disabled onclick="showUploadSettings()">设置参数并生成</button>
</div>

<!-- Upload video settings -->
<div class="upload-video-settings" id="upload-video-settings">
  <div class="video-settings-body">
    <label for="upload-video-prompt">视频提示词</label>
    <textarea id="upload-video-prompt" maxlength="800" placeholder="描述视频中的动态效果"></textarea>
    <p class="hint-text">建议400字以内</p>

    <div class="row">
      <div>
        <label for="upload-video-frames">时长</label>
        <select id="upload-video-frames">
          <option value="121">5 秒</option>
          <option value="241">10 秒</option>
        </select>
      </div>
      <div>
        <label for="upload-video-seed">随机种子</label>
        <input type="number" id="upload-video-seed" value="-1" min="-1" max="999999">
        <p class="hint-text">-1=随机，相同种子+相同参数=相同视频</p>
      </div>
    </div>

    <label>尾帧图片（可选）</label>
    <div class="last-frame-zone" onclick="document.getElementById('upload-last-frame-input').click()">
      <div id="upload-last-frame-label">点击上传尾帧图片（PNG/JPG）</div>
      <input type="file" id="upload-last-frame-input" accept="image/png,image/jpeg" onchange="handleUploadLastFrameSelect(event)">
    </div>

    <button class="btn-continue" onclick="handleUploadSubmit()">开始生成 Live Photo</button>
  </div>
</div>

<!-- Image preview card -->
<div class="preview-card" id="preview-card">
  <img id="preview-img" src="" alt="生成的图片">
  <div class="preview-actions">
    <button class="btn-secondary" onclick="saveImage()">保存图片</button>
  </div>

  <!-- Video settings -->
  <details class="video-settings" id="video-settings">
    <summary>视频参数设置</summary>
    <div class="video-settings-body">
      <label for="video-prompt">视频提示词</label>
      <textarea id="video-prompt" maxlength="800" placeholder="描述视频中的动态效果"></textarea>
      <p class="hint-text">默认使用图片生成时的描述，可修改。建议400字以内</p>

      <div class="row">
        <div>
          <label for="video-frames">时长</label>
          <select id="video-frames">
            <option value="121">5 秒</option>
            <option value="241">10 秒</option>
          </select>
        </div>
        <div>
          <label for="video-seed">随机种子</label>
          <input type="number" id="video-seed" value="-1" min="-1" max="999999">
          <p class="hint-text">-1=随机，相同种子+相同参数=相同视频</p>
        </div>
      </div>

      <label>尾帧图片（可选）</label>
      <div class="last-frame-zone" onclick="document.getElementById('last-frame-input').click()">
        <div id="last-frame-label">点击上传尾帧图片（PNG/JPG）</div>
        <input type="file" id="last-frame-input" accept="image/png,image/jpeg" onchange="handleLastFrameSelect(event)">
      </div>

      <button class="btn-continue" onclick="continueToVideo()">继续生成 Live Photo</button>
    </div>
  </details>

  <!-- Progress (shown during video generation) -->
  <div class="preview-progress" id="preview-progress">
    <div class="progress-bar"><div class="progress-fill" id="preview-progress-fill"></div></div>
    <div class="preview-progress-text" id="preview-progress-text"></div>
  </div>
</div>

<!-- Status area -->
<div id="status-area" aria-live="polite">
  <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
  <div id="status-text"></div>
  <div id="error-text"></div>
</div>

<!-- Download area -->
<div id="download-area">
  <a id="download-link" href="#">下载 Live Photo</a>
</div>

<script>
const POLL_INTERVAL = 3000;
const MAX_FILE_SIZE = 20 * 1024 * 1024;
const IMAGE_KEY = 'lpm_image_task';
const VIDEO_KEY = 'lpm_video_task';

let pollTimer = null;
let currentMode = 'api';
let currentImageTaskId = null;
let selectedFile = null;
let lastFrameB64 = null;
let uploadLastFrameB64 = null;
let imagePrompt = '';

function $(id) { return document.getElementById(id); }

function setMode(mode) {
  currentMode = mode;
  document.querySelectorAll('.mode-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.mode === mode);
  });
}

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.toggle('active', p.id === `panel-${tab}`));
  $('error-text').textContent = '';
  $('status-area').classList.remove('visible');
  $('download-area').classList.remove('visible');
}

function selectFile(file) {
  if (!file) return;
  if (file.size > MAX_FILE_SIZE) { alert(`图片不能超过 ${MAX_FILE_SIZE / 1024 / 1024}MB`); return; }
  selectedFile = file;
  $('upload-filename').textContent = file.name;
  $('upload-btn').disabled = false;
}

function handleFileSelect(event) {
  selectFile(event.target.files[0]);
}

// Drag & drop
const uploadZone = $('upload-zone');
uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('drag-over'); });
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag-over'));
uploadZone.addEventListener('drop', e => {
  e.preventDefault();
  uploadZone.classList.remove('drag-over');
  selectFile(e.dataTransfer.files[0]);
});

function handleLastFrameSelect(event) {
  const file = event.target.files[0];
  if (!file) return;
  if (file.size > 4.7 * 1024 * 1024) { alert('尾帧图片不能超过 4.7MB'); return; }
  const reader = new FileReader();
  reader.onload = () => {
    lastFrameB64 = reader.result.split(',')[1];
    $('last-frame-label').textContent = `已选择: ${file.name}`;
  };
  reader.readAsDataURL(file);
}

function handleUploadLastFrameSelect(event) {
  const file = event.target.files[0];
  if (!file) return;
  if (file.size > 4.7 * 1024 * 1024) { alert('尾帧图片不能超过 4.7MB'); return; }
  const reader = new FileReader();
  reader.onload = () => {
    uploadLastFrameB64 = reader.result.split(',')[1];
    $('upload-last-frame-label').textContent = `已选择: ${file.name}`;
  };
  reader.readAsDataURL(file);
}

function showUploadSettings() {
  if (!selectedFile) return alert('请先选择图片');
  $('upload-video-settings').classList.add('visible');
}

// ── Text → Image ──

async function handleTextSubmit() {
  const prompt = $('prompt').value.trim();
  if (!prompt) return alert('请输入描述');
  if (prompt.length > 500) return alert('超过 500 字符限制');

  imagePrompt = prompt;
  const btn = $('submit-btn');
  btn.disabled = true;

  try {
    const resp = await fetch('/api/generate-image', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt }),
    });
    if (!resp.ok) {
      const err = await resp.json();
      alert(err.detail || '请求失败');
      btn.disabled = false;
      return;
    }
    const data = await resp.json();
    currentImageTaskId = data.task_id;
    localStorage.setItem(IMAGE_KEY, data.task_id);
    startImagePolling(data.task_id);
  } catch (e) {
    alert('网络错误，请重试');
    btn.disabled = false;
  }
}

function startImagePolling(taskId) {
  $('status-area').classList.add('visible');
  $('error-text').textContent = '';
  if (pollTimer) clearInterval(pollTimer);
  pollTimer = setInterval(async () => {
    try {
      const resp = await fetch(`/api/status/${taskId}`);
      if (!resp.ok) { clearInterval(pollTimer); return; }
      const data = await resp.json();

      $('status-text').textContent = data.progress_message || data.status;

      if (data.status === 'generating_image') {
        $('progress-fill').style.width = '50%';
      } else if (data.status === 'image_ready') {
        $('progress-fill').style.width = '100%';
        clearInterval(pollTimer);
        $('status-area').classList.remove('visible');
        showImagePreview(taskId, data.image_base64, data.video_prompt);
        $('submit-btn').disabled = false;
      } else if (data.status === 'failed') {
        clearInterval(pollTimer);
        $('error-text').textContent = data.error || '生成失败，请重试';
        localStorage.removeItem(IMAGE_KEY);
        $('submit-btn').disabled = false;
      }
    } catch (e) { /* continue */ }
  }, POLL_INTERVAL);
}

// ── Upload → Video ──

async function handleUploadSubmit() {
  if (!selectedFile) return alert('请先选择图片');

  const btn = $('upload-btn');
  btn.disabled = true;
  $('upload-video-settings').classList.remove('visible');

  // Show status area for progress
  $('status-area').classList.add('visible');
  $('error-text').textContent = '';
  $('status-text').textContent = '已上传图片，正在生成视频…';
  $('progress-fill').style.width = '25%';

  try {
    const formData = new FormData();
    formData.append('file', selectedFile);
    formData.append('mode', currentMode);
    formData.append('video_prompt', $('upload-video-prompt').value);
    formData.append('video_frames', $('upload-video-frames').value);
    formData.append('video_seed', $('upload-video-seed').value);
    if (uploadLastFrameB64) {
      formData.append('last_frame_base64', uploadLastFrameB64);
    }

    const resp = await fetch('/api/upload-and-generate', {
      method: 'POST',
      body: formData,
    });
    if (!resp.ok) {
      const err = await resp.json();
      alert(err.detail || '请求失败');
      btn.disabled = false;
      return;
    }
    const data = await resp.json();
    localStorage.setItem(VIDEO_KEY, data.task_id);
    startVideoPolling(data.task_id, () => {
      btn.disabled = false;
      // Reset upload state
      selectedFile = null;
      uploadLastFrameB64 = null;
      $('upload-filename').textContent = '';
      $('upload-video-prompt').value = '';
      $('upload-last-frame-label').textContent = '点击上传尾帧图片（PNG/JPG）';
    });
  } catch (e) {
    alert('网络错误，请重试');
    btn.disabled = false;
  }
}

// ── Image preview + actions ──

function showImagePreview(taskId, imageBase64, videoPrompt) {
  currentImageTaskId = taskId;
  $('preview-img').src = `data:image/png;base64,${imageBase64}`;
  $('preview-card').classList.add('visible');
  $('preview-actions').style.display = '';
  $('video-settings').style.display = '';
  $('preview-progress').style.display = 'none';

  $('video-prompt').value = videoPrompt || imagePrompt || '';
}

function saveImage() {
  const link = document.createElement('a');
  link.download = `livephoto_${Date.now()}.png`;
  link.href = $('preview-img').src;
  link.click();
}

function collectVideoSettings() {
  return {
    video_prompt: $('video-prompt').value,
    video_seed: parseInt($('video-seed').value, 10) || -1,
    video_frames: parseInt($('video-frames').value, 10) || 121,
    last_frame_base64: lastFrameB64,
  };
}

function continueToVideo() {
  if (!currentImageTaskId) return;
  $('preview-actions').style.display = 'none';
  $('video-settings').style.display = 'none';
  $('preview-progress').style.display = '';
  $('preview-progress-text').textContent = '正在生成动态视频，请耐心等待…';

  const settings = collectVideoSettings();

  fetch('/api/generate-video', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      task_id: currentImageTaskId,
      mode: currentMode,
      ...settings,
    }),
  }).then(r => {
    if (!r.ok) return r.json().then(err => { throw new Error(err.detail || '请求失败'); });
    return r.json();
  }).then(data => {
    if (data.task_id) {
      localStorage.setItem(VIDEO_KEY, data.task_id);
      startVideoPolling(data.task_id, () => {
        $('preview-card').classList.remove('visible');
      });
    }
  }).catch(e => {
    $('preview-progress').style.display = 'none';
    $('preview-actions').style.display = '';
    $('video-settings').style.display = '';
    $('error-text').textContent = e.message;
    $('status-area').classList.add('visible');
  });
}

// ── Video polling ──

function startVideoPolling(taskId, onDone) {
  $('status-area').classList.add('visible');
  $('download-area').classList.remove('visible');
  $('error-text').textContent = '';

  if (pollTimer) clearInterval(pollTimer);
  pollTimer = setInterval(async () => {
    try {
      const resp = await fetch(`/api/status/${taskId}`);
      if (!resp.ok) { clearInterval(pollTimer); return; }
      const data = await resp.json();

      const msg = data.progress_message || data.status;
      $('status-text').textContent = msg;

      let pct = 0;
      if (data.status === 'generating_video') {
        pct = 50;
      } else if (data.status === 'packaging') {
        pct = 80;
      } else if (data.status === 'done') {
        pct = 100;
      }
      $('progress-fill').style.width = pct + '%';
      const previewFill = $('preview-progress-fill');
      if (previewFill) previewFill.style.width = pct + '%';
      const previewText = $('preview-progress-text');
      if (previewText) previewText.textContent = msg;

      if (data.status === 'done') {
        clearInterval(pollTimer);
        $('status-area').classList.remove('visible');
        $('download-area').classList.add('visible');
        $('download-link').href = data.download_url || `/api/download/${taskId}`;
        localStorage.removeItem(VIDEO_KEY);
        localStorage.removeItem(IMAGE_KEY);
        onDone();
      } else if (data.status === 'failed') {
        clearInterval(pollTimer);
        $('preview-progress').style.display = 'none';
        $('preview-actions').style.display = '';
        $('video-settings').style.display = '';
        $('error-text').textContent = data.error || '生成失败，请重试';
        $('status-area').classList.add('visible');
        localStorage.removeItem(VIDEO_KEY);
        onDone();
      }
    } catch (e) { /* continue */ }
  }, POLL_INTERVAL);
}

// ── Session recovery ──

window.addEventListener('DOMContentLoaded', () => {
  const savedImage = localStorage.getItem(IMAGE_KEY);
  const savedVideo = localStorage.getItem(VIDEO_KEY);
  if (savedVideo) {
    startVideoPolling(savedVideo, () => {});
  } else if (savedImage) {
    startImagePolling(savedImage);
  }
});
</script>

</body>
</html>
